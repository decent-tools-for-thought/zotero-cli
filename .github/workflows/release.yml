name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish. Defaults to v<project version>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release tag
        id: release_meta
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="${{ github.event.inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -z "$tag" ]; then
            tag="v${version}"
          fi
          test "$tag" = "v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate release checksums
        run: |
          (
            cd dist
            sha256sum zotero_cli-* > SHA256SUMS
          )

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install --no-deps dist/*.whl
          .venv-wheel/bin/python -c "import zotero_sqlite_tool"
          .venv-wheel/bin/zotero-sqlite-tool --help >/dev/null

      - name: Verify sdist install
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          .venv-sdist/bin/python -c "import zotero_sqlite_tool"
          .venv-sdist/bin/zotero-sqlite-tool --help >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: zotero-cli-dist
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zotero-cli-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS
