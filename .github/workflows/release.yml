name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish. Defaults to v<project version>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6

      - name: Resolve release tag
        id: release_meta
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="${{ github.event.inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -z "$tag" ]; then
            tag="v${version}"
          fi
          test "$tag" = "v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests

      - name: Run unit tests
        run: uv run pytest

      - name: Build Python distributions
        run: uv build

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Verify wheel install
        run: |
          uv venv .venv-wheel
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python -c "import zotero_sqlite_tool"
          .venv-wheel/bin/zotero-sqlite-tool --help >/dev/null

      - name: Verify sdist install
        run: |
          uv venv .venv-sdist
          uv pip install --python .venv-sdist/bin/python dist/*.tar.gz
          .venv-sdist/bin/python -c "import zotero_sqlite_tool"
          .venv-sdist/bin/zotero-sqlite-tool --help >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: zotero-cli-dist
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zotero-cli-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/SHA256SUMS.txt
            dist/*.tar.gz
            dist/*.whl
