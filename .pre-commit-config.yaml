repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: bash -lc 'UV_CACHE_DIR=/tmp/uv-cache TMPDIR=/tmp uv run ruff format "$@"' --
        language: system
        types_or: [python, pyi]
      - id: ruff-check-fix
        name: Ruff check --fix
        entry: bash -lc 'UV_CACHE_DIR=/tmp/uv-cache TMPDIR=/tmp uv run ruff check --fix "$@"' --
        language: system
        types_or: [python, pyi]
      - id: no-merge-conflicts
        name: No merge conflict markers
        entry: bash -lc 'for f in "$@"; do if [ -f "$f" ] && rg -n "^(<<<<<<<|=======|>>>>>>>)" "$f"; then exit 1; fi; done' --
        language: system
        pass_filenames: true
